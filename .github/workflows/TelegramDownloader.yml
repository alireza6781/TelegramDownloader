name: TelegramDownloader

on:
  workflow_dispatch:
    inputs:
      telegram_link:
        description: '🔗 Telegram post link (Public Channel/Group)'
        required: true
        type: string
      split_threshold_mb:
        description: '📦 Maximum file size per part (MB)'
        required: false
        type: number
        default: 90

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📂 Clone repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq zip openssl aria2 yt-dlp python3-pip
          pip3 install --break-system-packages requests

      - name: 📡 Extract Post ID and Channel
        id: extract
        run: |
          LINK="${{ github.event.inputs.telegram_link }}"
          echo "🔗 Processing link: $LINK"
          
          # Extract channel/username and post ID
          # Format: https://t.me/channelname/postid
          CHANNEL=$(echo "$LINK" | grep -oP '(?<=/)[^/]+(?=/)')
          POST_ID=$(echo "$LINK" | grep -oP '(?<=/)[^/]+$')
          
          if [ -z "$CHANNEL" ] || [ -z "$POST_ID" ]; then
            echo "❌ Could not extract channel or post ID from link."
            echo "Please ensure the link is in format: https://t.me/channelname/postid"
            exit 1
          fi
          
          echo "📂 Channel: $CHANNEL"
          echo "🆔 Post ID: $POST_ID"
          
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "post_id=$POST_ID" >> $GITHUB_OUTPUT

      - name: ⬇️ Download file with yt-dlp
        id: download
        run: |
          CHANNEL="${{ steps.extract.outputs.channel }}"
          POST_ID="${{ steps.extract.outputs.post_id }}"
          
          mkdir -p downloads
          
          echo "═══════════════════════════════════════════════════════════════"
          echo "⬇️ Downloading from t.me/$CHANNEL/$POST_ID"
          echo "═══════════════════════════════════════════════════════════════"

          # Use yt-dlp to download the media
          # --no-check-cert: Skip certificate verification if needed
          # -o: Output template
          yt-dlp --no-check-cert \
                 -o "downloads/%(title)s.%(ext)s" \
                 "https://t.me/$CHANNEL/$POST_ID"

          # Check if download was successful
          if [ ! -f "downloads/*" ]; then
            echo "❌ Download failed! No file found in downloads."
            exit 1
          fi

          # Get the downloaded file name
          DOWNLOADED_FILE=$(ls downloads/* | head -n 1)
          FINAL_NAME=$(basename "$DOWNLOADED_FILE")
          
          SIZE=$(stat -c%s "$DOWNLOADED_FILE")
          
          if [ "$SIZE" -lt 10240 ]; then
            echo "❌ ERROR: Invalid file (${SIZE} bytes)"
            rm "$DOWNLOADED_FILE"
            exit 1
          fi

          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "✅ Download complete! Size: ${SIZE_MB} MB"
          echo "file_size=$SIZE" >> $GITHUB_OUTPUT
          echo "downloaded_name=$FINAL_NAME" >> $GITHUB_OUTPUT

      - name: ✂️ Split large file
        if: github.event.inputs.split_threshold_mb != '0'
        run: |
          THRESHOLD="${{ github.event.inputs.split_threshold_mb }}"
          FILENAME="${{ steps.download.outputs.downloaded_name }}"
          FILE_SIZE="${{ steps.download.outputs.file_size }}"
          
          LIMIT=$((THRESHOLD * 1024 * 1024))
          
          if [ -n "$FILE_SIZE" ] && [ "$FILE_SIZE" -gt "$LIMIT" ]; then
            echo "✂️ Splitting into ${THRESHOLD}MB parts..."
            cd downloads
            
            # Create zip split
            zip -s "${THRESHOLD}m" "${FILENAME}.zip" -j "$FILENAME"
            
            # Remove the original file
            rm "$FILENAME"
            
            cd ..
          fi

      - name: 🔄 Fix filenames (remove Persian/Arabic, special chars)
        run: |
          cd downloads
          for file in *; do
            [ -e "$file" ] || continue
            EXT="${file##*.}"
            
            if [[ "$EXT" == "$file" ]]; then
              EXT="bin"
            fi
            
            if [[ "$file" =~ [^[:ascii:]] ]]; then
              RANDOM_NAME=$(openssl rand -hex 8)
              NEW_NAME="${RANDOM_NAME}.${EXT}"
              echo "   🌐 Renaming: $file -> $NEW_NAME"
              mv "$file" "$NEW_NAME"
            else
              CLEAN_NAME=$(echo "$file" | sed 's/[^a-zA-Z0-9._-]/_/g' | sed 's/__*/_/g')
              if [ "$file" != "$CLEAN_NAME" ]; then
                echo "   📝 Cleaning: $file -> $CLEAN_NAME"
                mv "$file" "$CLEAN_NAME"
              fi
            fi
          done
          cd ..

      - name: 📤 Upload to GitHub (Batch upload - 1 file at a time)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ ! -d "downloads" ] || [ -z "$(ls -A downloads 2>/dev/null)" ]; then
            echo "⚠️ No files to upload!"
            exit 1
          fi
          
          NEW_FILES=()
          for file in downloads/*; do
            filename=$(basename "$file")
            if ! git ls-files --error-unmatch "downloads/$filename" &>/dev/null; then
              NEW_FILES+=("$filename")
            else
              echo "⏭️ Skipping already uploaded file: $filename"
            fi
          done
          
          TOTAL=${#NEW_FILES[@]}
          if [ "$TOTAL" -eq 0 ]; then
            echo "✅ No new files to upload!"
            exit 0
          fi
          
          echo "═══════════════════════════════════════════════════════════════"
          echo "📦 Total new files to upload: $TOTAL"
          echo "═══════════════════════════════════════════════════════════════"
          
          for (( i=0; i<TOTAL; i++ )); do
            echo ""
            echo "🚀 Uploading file $((i+1)) of $TOTAL: ${NEW_FILES[$i]}"
            git add "downloads/${NEW_FILES[$i]}"
            git commit -m "Add ${NEW_FILES[$i]} [skip ci]"
            
            for attempt in 1 2 3; do
              if git push origin main 2>&1; then
                echo "   ✅ Uploaded successfully"
                break
              else
                if [ $attempt -lt 3 ]; then
                  echo "   ⚠️ Push failed, retry $attempt/3..."
                  git reset --soft HEAD~1
                  sleep 5
                else
                  echo "   ❌ Failed to upload ${NEW_FILES[$i]}"
                  git reset --soft HEAD~1
                fi
              fi
            done
            sleep 2
          done
          
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "🎉 All $TOTAL new files uploaded successfully!"
          echo ""
          echo "📂 Uploaded files:"
          ls -lh downloads/
          echo "═══════════════════════════════════════════════════════════════"

      - name: 📋 Final report
        if: always()
        run: |
          echo ""
          echo "┌─────────────────────────────────────────────────────────────┐"
          echo "│                   Download Final Report                    │"
          echo "├─────────────────────────────────────────────────────────────┤"
          echo "│ 🔗 Link: ${{ github.event.inputs.telegram_link }}"
          echo "│ 📁 Path: ./downloads/"
          echo "└─────────────────────────────────────────────────────────────┘"
